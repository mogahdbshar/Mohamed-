# خطة البناء التلقائية لتطبيق دستور سبورت (Destour TV)
# هذا الملف يقوم ببناء تطبيق الأندرويد تلقائياً عند دفع الكود إلى موقع جيت هاب (GitHub)
# مخرجات البناء: ملف APK جاهز للتثبيت والمشاركة بالكامل!

name: البناء التلقائي لملف APK (Destour TV Build)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر داخل جيت هاب

jobs:
  build:
    name: بناء وتجميع التطبيق (Build APK)
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود بالكامل من المستودع الخاص بك
      - name: جلب الكود من جيت هاب (Checkout Code)
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا المتوافقة مع أحدث حزم أندرويد (JDK 17)
      - name: إعداد بيئة جافا (Setup JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. إعداد أداة جاردل الذكية وضبط الذاكرة والبناء السريع
      - name: إعداد أداة بناء جاردل (Setup Gradle)
        uses: gradle/actions/setup-gradle@v3

      # 4. إذا لم يكن ملف gradle wrapper متوفراً، يتم توليده تلقائياً لضمان عدم توقف البناء
      - name: توليد مشغل جاردل (Generate Gradle Wrapper if missing)
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      # 5. استعادة ملف مفتاح التوقيع من قاعدة base64 لتفادي خطأ التجميع في جيت هاب
      - name: استعادة مفتاح التوقيع التجريبي (Decode Debug Keystore)
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found!"
          fi

      # 6. تهيئة إعدادات الأداة لتوافق KSP (تحويل من in-process إلى daemon لبيئة جيت هاب)
      - name: ضبط استراتيجية المترجم لـ KSP (Configure Compiler for KSP)
        run: |
          if [ -f "gradle.properties" ]; then
            sed -i 's/kotlin.compiler.execution.strategy=in-process/# kotlin.compiler.execution.strategy=in-process/g' gradle.properties
            echo "Disabled in-process compiling strategy for GitHub runner successfully."
          fi

      # 7. بناء وتصدير حزمة الأندرويد التجريبية الفورية (Debug APK)
      # هذه الحزمة تعمل فوراً على أي هاتف بدون الحاجة لمفاتيح توقيع معقدة
      - name: بناء وتجميع حزمة الـ APK (Assemble Debug APK)
        run: ./gradlew assembleDebug

      # 8. جلب ملف الـ APK المرفوع ووضعه كملف مخرج (Artifact)
      # يمكنك تحميل ملف الـ APK هذا من تبويب "Actions" داخل مستودع جيت هاب الخاص بك مباشرة!
      - name: رفع ملف الـ APK للتنزيل المباشر (Upload APK Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Destour-TV-Sport-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7 # يتم الاحتفاظ بالملف لمدة 7 أيام للتنزيل
